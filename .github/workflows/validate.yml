name: Validate

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  no-dev-fixture:
    # `_dev_fixture.py` is a gitignored, dev-only hook some siblings
    # ship to inject a recorded payload during local development. It
    # must never enter the repo — gitignore covers accidental staging,
    # this guards against `git add -f` or the rule being deleted. Loud,
    # fast, first job.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Verify _dev_fixture.py is not committed
        run: |
          if [ -f custom_components/tankstellen_austria/_dev_fixture.py ]; then
            echo "::error::custom_components/tankstellen_austria/_dev_fixture.py must never be committed (dev-only hook)."
            exit 1
          fi

  validate-hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hacs/action@main
        with:
          category: integration

  validate-hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: home-assistant/actions/hassfest@master

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          # Pinned to 3.14 — HA core 2026.4.4 declares
          # `Requires-Python >=3.14.2`. Earlier in the cycle the pyo3
          # 0.24 dependency tree (pydantic-core / orjson / Pillow)
          # didn't yet support 3.14 and CI fell back to 3.13; the
          # ecosystem has caught up and 3.14 is the current target.
          python-version: "3.14"
      - name: Install dependencies
        # PyO3 0.24 (still pinned by transitive deps pydantic-core /
        # orjson / Pillow that HA core hasn't bumped past) refuses to
        # build against Python ≥3.14 unless the stable-ABI forward-
        # compat flag is set. Setting it here lets the CI tests run on
        # 3.14 without waiting for every pyo3-using dep to ship 0.25+.
        # Drop this env once HA's pyo3 dependency tree is uniformly
        # 0.25+ (check `pip show pydantic_core orjson Pillow` for the
        # bundled pyo3 version on a fresh HA release).
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
        run: pip install -r requirements_test.txt
      - name: Run Linter (Ruff)
        run: |
          pip install ruff
          ruff check .
      - name: Run mypy (strict)
        run: mypy --strict --ignore-missing-imports custom_components/tankstellen_austria
      - name: Run tests
        run: pytest tests/ -v

  validate-card:
    # Rebuilds the Lovelace card bundle from src/ and verifies the output
    # is valid JS. Catches TS errors, missing deps, and high-severity npm
    # advisories before they reach the served www/tankstellen-austria-card.js.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Guard against backticks inside Lit css/html templates
        # The `css\`...\`` and `html\`...\`` tagged templates are
        # backtick-delimited; a stray backtick inside a comment or a
        # CSS class reference (`.foo`) terminates the literal early
        # and the rest of the template parses as JavaScript. Build
        # still succeeds (the bundle is valid JS) but the card crashes
        # at module load. Cheapest possible CI guard: scan the body of
        # every cardStyles / editorStyles / html`` template for an
        # unescaped backtick.
        run: |
          if perl -0777 -ne '
            while (m{(css|html)\`(.*?)(?<!\\)\`}gs) {
              my ($tag, $body) = ($1, $2);
              if ($body =~ /\`/) {
                print "Stray backtick inside ${tag}\`...\` template\n";
                print "Surrounding text:\n";
                print substr($body, 0, 240), "\n...\n";
                exit 1;
              }
            }
            exit 0;
          ' src/*.ts src/**/*.ts; then
            echo "OK: no stray backticks in tagged templates"
          else
            echo "::error::A backtick inside a Lit css/html template will" \
              "terminate the literal early and silently break the card." \
              "Use single quotes, double quotes, or word descriptions in" \
              "comments and class-name references."
            exit 1
          fi
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
      - name: Install card deps
        run: npm ci
      - name: Audit production deps
        # --omit=dev keeps the gate enforceable; without it Rollup-plugin
        # advisories (which never ship to users) flood the report and the
        # team learns to ignore failures.
        run: npm audit --omit=dev --audit-level=high
      - name: Type-check (strict)
        # Rollup's @rollup/plugin-typescript is more permissive than tsc
        # in strict mode. Run tsc separately so TS regressions surface in
        # CI instead of slipping into the bundle.
        run: npx tsc --noEmit
      - name: Build card bundle
        run: npm run build
      - name: Syntax-check bundle
        # `node -c` parses without executing — cheapest possible check that
        # Rollup didn't somehow produce malformed JS.
        run: node -c custom_components/tankstellen_austria/www/tankstellen-austria-card.js
